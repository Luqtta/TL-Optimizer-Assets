name: Build ADLX_3DSettings (Release)

# Compila o ADLX_3DSettings.dll do JamesCJ60/ADLX-SDK-Wrapper em RELEASE, na infra do GitHub
# (MSVC + CMake ja' vem no windows runner). Fonte publica + build reproduzivel -> DLL confiavel,
# sem instalar Visual Studio e sem baixar de site pirata. Rode manualmente: aba Actions -> este
# workflow -> "Run workflow". Baixe o artifact "ADLX_3DSettings-release-x64" no fim.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout wrapper (JamesCJ60/ADLX-SDK-Wrapper)
        uses: actions/checkout@v4
        with:
          repository: JamesCJ60/ADLX-SDK-Wrapper
          path: wrapper

      - name: Checkout ADLX SDK (GPUOpen-LibrariesAndSDKs/ADLX)
        uses: actions/checkout@v4
        with:
          repository: GPUOpen-LibrariesAndSDKs/ADLX
          path: adlx-sdk

      # O .cpp inclui "SDK/..." relativo a pasta do projeto, e o CMake usa ${CMAKE_SOURCE_DIR}/SDK.
      # Entao a pasta SDK/ do SDK oficial precisa ficar dentro de "ADLX 3D Settings/".
      - name: Colocar o SDK dentro do projeto
        shell: pwsh
        run: Copy-Item -Recurse -Force "adlx-sdk/SDK" "wrapper/ADLX 3D Settings/SDK"

      - name: Configurar (CMake, x64)
        run: cmake -S "wrapper/ADLX 3D Settings" -B build -A x64

      - name: Compilar (Release)
        run: cmake --build build --config Release

      - name: Listar DLLs geradas
        if: always()
        shell: pwsh
        run: Get-ChildItem -Recurse build -Filter *.dll | Select-Object FullName

      - name: Publicar o DLL como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ADLX_3DSettings-release-x64
          path: build/**/ADLX_3DSettings.dll
          if-no-files-found: error
